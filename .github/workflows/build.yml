name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:v1.5.0
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Fix permissions
      run: |
        mkdir -p ~/.buildozer
        chmod -R 777 ~/.buildozer
        chmod -R 777 .
        
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log
      env:
        BUILDOZER_WARN_ON_ROOT: 0
        
    - name: Check build output
      if: failure()
      run: |
        echo "=== Buildozer Spec ==="
        cat buildozer.spec
        echo "=== Build Log ==="
        tail -100 build.log
          
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: timer-app-apk
        path: bin/*.apk
        
    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
